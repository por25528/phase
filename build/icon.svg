<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Warm terracotta, slightly lighter at the top for a subtle sheen -->
    <linearGradient id="body" x1="512" y1="96" x2="512" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D9633E"/>
      <stop offset="0.55" stop-color="#C8512F"/>
      <stop offset="1" stop-color="#B4453A"/>
    </linearGradient>
    <!-- Soft grounded drop shadow under the rounded square -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#4A1A0E" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- macOS-style rounded square body -->
  <g filter="url(#shadow)">
    <rect x="100" y="96" width="824" height="824" rx="188" ry="188" fill="url(#body)"/>
  </g>

  <!-- Gentle top highlight for depth -->
  <rect x="100" y="96" width="824" height="824" rx="188" ry="188"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="3"/>

  <!-- Phase glyph (same silhouette as the app favicon), in cream -->
  <g transform="translate(304,314) scale(8.85)">
    <path fill="#FAF9F7" d="M25.842 44.938c-.664.844-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.183c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.498 0-3.579-1.842-3.579H1.133c-.92 0-1.456-1.04-.92-1.787L9.91.473c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.578 1.842 3.578h11.377c.943 0 1.473 1.088.89 1.832L25.843 44.94z"/>
  </g>
</svg>
