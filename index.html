<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#FAF9F7" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phase — Goals</title>
    <!-- No-FOUC: resolve the theme from localStorage (falling back to the OS
         preference) and paint <html> before the module bundle loads, so a dark
         reload never flashes light. Mirrors resolveTheme() in src/lib/theme.ts. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('phase-theme');
          var dark =
            pref === 'dark' ||
            (pref !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) {
            var el = document.documentElement;
            el.classList.add('dark');
            el.style.colorScheme = 'dark';
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', '#000000');
          }
        } catch (e) {
          /* localStorage blocked (private mode) — fall through to light. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
