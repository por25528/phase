<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase — Goals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FCFCFB; --panel:#FFFFFF;
    --ink:#1A1A1A; --ink-soft:#3C3C3A; --muted:#8A8A86; --faint:#B6B6B1;
    --line:#ECEBE7; --line-2:#E1E0DB; --hover:#F4F3F0;
    --fill:#2C2C2A; --track:#EDECE8;
    --accent:#5D6B82; --accent-tint:#EBEEF3;
    --r:7px;
    --disp:'Fraunces',Georgia,serif;
    --ui:'Inter',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--ui);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:14px;color:var(--ink)}
  ::selection{background:var(--accent-tint)}

  /* ---------- Sidebar ---------- */
  .side{width:212px;flex-shrink:0;height:100vh;border-right:1px solid var(--line);
    padding:22px 14px;display:flex;flex-direction:column;position:sticky;top:0}
  .brand{font-family:var(--disp);font-size:1.32rem;font-weight:600;letter-spacing:-.01em;
    padding:0 8px 2px}
  .brand em{font-style:italic;color:var(--accent)}
  .brand-sub{font-size:.72rem;color:var(--muted);padding:0 8px 20px}
  .nav{display:flex;flex-direction:column;gap:1px}
  .nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;
    padding:7px 9px;border-radius:6px;color:var(--ink-soft);font-weight:450;font-size:.9rem}
  .nav button:hover{background:var(--hover)}
  .nav button.on{background:var(--accent-tint);color:var(--ink);font-weight:500}
  .nav .ic{width:15px;height:15px;flex-shrink:0;opacity:.85}
  .side-foot{margin-top:auto;display:flex;flex-direction:column;gap:6px;padding-top:14px;border-top:1px solid var(--line)}
  .side-foot button{font-size:.78rem;color:var(--muted);padding:5px 8px;border-radius:6px;text-align:left}
  .side-foot button:hover{background:var(--hover);color:var(--ink-soft)}

  /* ---------- Main ---------- */
  .main{flex:1;min-width:0;height:100vh;overflow-y:auto}
  .wrap{max-width:880px;margin:0 auto;padding:42px 40px 90px}
  .view-h{font-family:var(--disp);font-size:1.74rem;font-weight:600;letter-spacing:-.015em;margin-bottom:3px}
  .view-sub{color:var(--muted);font-size:.86rem;margin-bottom:30px}
  .sec-label{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);
    font-weight:600;margin:34px 0 12px}
  .sec-label:first-child{margin-top:0}

  /* ---------- Generic rows / inputs ---------- */
  .row-add{display:flex;align-items:center;gap:8px;margin-top:8px}
  .ghost-in{flex:1;border:none;background:transparent;padding:5px 2px;outline:none;
    color:var(--ink);font-size:.9rem}
  .ghost-in::placeholder{color:var(--faint)}
  .add-btn{font-size:.82rem;color:var(--muted);padding:5px 9px;border-radius:6px;border:1px solid var(--line-2)}
  .add-btn:hover{background:var(--hover);color:var(--ink-soft)}
  .x{opacity:0;color:var(--faint);font-size:15px;line-height:1;padding:2px 4px;border-radius:4px;transition:opacity .12s}
  .x:hover{color:#b4453a;background:#faf0ef}
  .tag{font-size:.7rem;color:var(--accent);background:var(--accent-tint);
    padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
  select.mini{border:1px solid var(--line-2);border-radius:6px;padding:4px 6px;font-size:.78rem;background:var(--panel);color:var(--ink-soft)}
  input.date{border:1px solid var(--line-2);border-radius:6px;padding:4px 7px;font-size:.78rem;color:var(--ink-soft);background:var(--panel)}

  /* ---------- Checkbox ---------- */
  .cb{width:17px;height:17px;border:1.5px solid var(--line-2);border-radius:5px;flex-shrink:0;
    display:grid;place-items:center;transition:.12s}
  .cb:hover{border-color:var(--muted)}
  .cb.ck{background:var(--fill);border-color:var(--fill)}
  .cb svg{width:11px;height:11px;stroke:#fff;stroke-width:2.4;fill:none;opacity:0;transition:opacity .12s}
  .cb.ck svg{opacity:1}

  /* ---------- Progress bar ---------- */
  .pbar{height:6px;background:var(--track);border-radius:6px;overflow:hidden;flex:1}
  .pbar > i{display:block;height:100%;background:var(--fill);border-radius:6px;transition:width .25s ease}
  .pct{font-variant-numeric:tabular-nums;font-size:.8rem;color:var(--muted);min-width:34px;text-align:right}

  /* ---------- Goal cards / tree ---------- */
  .goal-card{padding:18px 0 8px;border-bottom:1px solid var(--line)}
  .goal-top{display:flex;align-items:baseline;gap:12px}
  .goal-title{font-family:var(--disp);font-size:1.18rem;font-weight:600;letter-spacing:-.01em}
  .goal-meta{font-size:.76rem;color:var(--muted);margin-left:auto;white-space:nowrap}
  .goal-prog{display:flex;align-items:center;gap:11px;margin:10px 0 6px}
  .goal-pct-big{font-family:var(--disp);font-size:1.05rem;font-weight:600;font-variant-numeric:tabular-nums;min-width:46px}

  .tree{margin:6px 0 4px}
  .node{}
  .node-row{display:flex;align-items:center;gap:9px;padding:4px 6px;border-radius:6px;margin-left:var(--ind,0)}
  .node-row:hover{background:var(--hover)}
  .node-row:hover .x{opacity:1}
  .twirl{width:14px;height:14px;flex-shrink:0;display:grid;place-items:center;color:var(--faint);font-size:9px;transition:transform .12s}
  .twirl.open{transform:rotate(90deg)}
  .twirl.leaf{visibility:hidden}
  .node-title{flex:1;font-size:.9rem;color:var(--ink-soft)}
  .node-title.done{color:var(--faint);text-decoration:line-through}
  .node-title.cont{font-weight:500;color:var(--ink)}
  .node-pct{font-size:.74rem;color:var(--muted);font-variant-numeric:tabular-nums}
  .node-add{margin-left:calc(var(--ind,0) + 23px);padding:3px 0}
  .node-add input{border:none;background:transparent;outline:none;font-size:.82rem;color:var(--ink);width:200px}
  .node-add input::placeholder{color:var(--faint)}

  /* ---------- Timeline (signature) ---------- */
  .tl{margin-top:6px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
  .tl-head{display:flex;border-bottom:1px solid var(--line);position:relative}
  .tl-lane-lbl{width:160px;flex-shrink:0;border-right:1px solid var(--line);padding:9px 12px;
    font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;background:var(--bg)}
  .tl-months{flex:1;display:flex;position:relative}
  .tl-mo{border-left:1px solid var(--line);padding:9px 0 9px 7px;font-size:.72rem;color:var(--muted);font-weight:500}
  .tl-mo:first-child{border-left:none}
  .tl-row{display:flex;align-items:stretch;border-bottom:1px solid var(--line);min-height:46px}
  .tl-row:last-child{border-bottom:none}
  .tl-row:hover .tl-lane{background:var(--hover)}
  .tl-lane{width:160px;flex-shrink:0;border-right:1px solid var(--line);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;gap:2px}
  .tl-lane-name{font-size:.84rem;font-weight:500;color:var(--ink);line-height:1.25}
  .tl-lane-rank{font-size:.66rem;color:var(--faint);font-weight:600;letter-spacing:.06em}
  .tl-plot{flex:1;position:relative}
  .tl-grid{position:absolute;inset:0;display:flex;pointer-events:none}
  .tl-grid > span{border-left:1px solid var(--line)}
  .tl-grid > span:first-child{border-left:none}
  .tl-today{position:absolute;top:0;bottom:0;width:1.5px;background:var(--accent);opacity:.55;z-index:3;pointer-events:none}
  .tl-bar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:6px;
    background:var(--track);border:1px solid var(--line-2);cursor:pointer;overflow:hidden;
    display:flex;align-items:center;transition:box-shadow .12s,border-color .12s;z-index:2}
  .tl-bar:hover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-tint)}
  .tl-bar > i{position:absolute;left:0;top:0;bottom:0;background:var(--fill);opacity:.9}
  .tl-bar > b{position:relative;font-size:.7rem;font-weight:600;color:#fff;padding-left:8px;
    mix-blend-mode:difference;font-variant-numeric:tabular-nums;z-index:2}
  .tl-flag{position:absolute;top:4px;bottom:4px;width:2px;background:var(--accent);z-index:4;pointer-events:none}
  .tl-flag::after{content:"";position:absolute;top:-1px;left:-2px;border:3px solid transparent;border-top-color:var(--accent)}
  .tl-hint{font-size:.76rem;color:var(--muted);margin-top:10px}

  /* ---------- Drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(20,20,18,.18);opacity:0;pointer-events:none;transition:opacity .18s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:420px;max-width:90vw;background:var(--panel);
    border-left:1px solid var(--line-2);transform:translateX(100%);transition:transform .2s ease;
    z-index:50;overflow-y:auto;padding:28px 26px 60px}
  .drawer.on{transform:translateX(0)}
  .drawer-close{position:absolute;top:18px;right:20px;color:var(--muted);font-size:18px;padding:4px 8px;border-radius:6px}
  .drawer-close:hover{background:var(--hover)}

  /* ---------- Habits / heatmap ---------- */
  .habit{padding:11px 0;border-bottom:1px solid var(--line)}
  .habit-top{display:flex;align-items:center;gap:11px}
  .habit-name{font-size:.92rem;font-weight:450;flex:1}
  .habit-stat{font-size:.74rem;color:var(--muted);font-variant-numeric:tabular-nums}
  .habit-stat b{color:var(--accent);font-weight:600}
  .nudge{font-size:.74rem;color:#b06a4f;margin-top:5px;margin-left:28px}
  .heat{display:flex;gap:2px;margin-top:8px;margin-left:28px}
  .heat-wk{display:flex;flex-direction:column;gap:2px}
  .heat-d{width:9px;height:9px;border-radius:2px;background:var(--track)}
  .heat-d.h{background:var(--fill)}
  .heat-d.fut{background:transparent}

  /* ---------- Day nav ---------- */
  .daynav{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .daynav .nudge-btn{padding:4px 9px;border-radius:6px;border:1px solid var(--line-2);font-size:.8rem;color:var(--ink-soft)}
  .daynav .nudge-btn:hover{background:var(--hover)}
  .daynav .lbl{font-family:var(--disp);font-size:1.04rem;font-weight:500}
  .daynav .sm{font-size:.76rem;color:var(--muted)}

  .task{display:flex;align-items:center;gap:10px;padding:6px;border-radius:6px}
  .task:hover{background:var(--hover)}
  .task:hover .x{opacity:1}
  .task-t{flex:1;font-size:.9rem;color:var(--ink-soft)}
  .task-t.done{color:var(--faint);text-decoration:line-through}
  .empty{color:var(--faint);font-size:.85rem;font-style:italic;padding:6px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:9px 16px;border-radius:8px;font-size:.84rem;
    opacity:0;transition:.22s;z-index:60}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:3px}
  @media(max-width:720px){.side{width:60px;padding:18px 8px}.brand,.brand-sub,.nav button span,.side-foot button{display:none}.wrap{padding:28px 18px 80px}}
</style>
</head>
<body>
  <aside class="side">
    <div class="brand">Phase<em>.</em></div>
    <div class="brand-sub">2026 · plan &amp; ship</div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <button id="exportBtn">↓ Export backup</button>
      <button id="importBtn">↑ Import backup</button>
      <input type="file" id="fileIn" accept="application/json" hidden>
    </div>
  </aside>
  <main class="main"><div class="wrap" id="view">Loading…</div></main>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer"><button class="drawer-close" id="drawerClose">✕</button><div id="drawerBody"></div></aside>
  <div class="toast" id="toast"></div>

<script>
const YEAR=2026;
const DAYS=[31,28,31,30,31,30,31,31,30,31,30,31];
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const KEY='phase-goals-v1';
let state=null, view='today', selDate=todayStr(), openGoal=null;
const expanded=new Set();   // node ids that are open (session)

/* ---------- date helpers ---------- */
function pad(n){return String(n).padStart(2,'0')}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function fmtD(s){const d=parseD(s);return `${MO[d.getMonth()]} ${d.getDate()}`}
function addDays(s,n){const d=parseD(s);d.setDate(d.getDate()+n);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function yearFrac(s){const d=parseD(s);const a=new Date(YEAR,0,1),b=new Date(YEAR,11,31,23,59);
  return Math.max(0,Math.min(1,(d-a)/(b-a)))}
function monthFrac(m){let s=0;for(let i=0;i<m;i++)s+=DAYS[i];return s/365}
function uid(){return Math.random().toString(36).slice(2,9)}

/* ---------- persistence ---------- */
async function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r)}catch(e){}return null}

/* ---------- percent ---------- */
function nodePct(n){
  if(n.children&&n.children.length)
    return n.children.reduce((s,c)=>s+nodePct(c),0)/n.children.length;
  return n.done?100:0;
}
function goalPct(g){
  if(!g.nodes||!g.nodes.length)return 0;
  return g.nodes.reduce((s,n)=>s+nodePct(n),0)/g.nodes.length;
}
function findNode(nodes,id){
  for(const n of nodes){if(n.id===id)return n;if(n.children){const r=findNode(n.children,id);if(r)return r}}
  return null;
}
function removeNode(nodes,id){
  for(let i=0;i<nodes.length;i++){if(nodes[i].id===id){nodes.splice(i,1);return true}
    if(nodes[i].children&&removeNode(nodes[i].children,id))return true}
  return false;
}

/* ---------- checkbox svg ---------- */
const CHK='<svg viewBox="0 0 12 12"><path d="M2 6.2 4.6 9 10 3"/></svg>';

/* =================== RENDER =================== */
function render(){
  renderNav();
  const v=document.getElementById('view');
  if(view==='today')v.innerHTML=viewToday();
  else if(view==='goals')v.innerHTML=viewGoals();
  else if(view==='timeline')v.innerHTML=viewTimeline();
  wire();
}
function renderNav(){
  const items=[['today','Today',iconSun],['goals','Goals',iconTarget],['timeline','Timeline',iconBars]];
  document.getElementById('nav').innerHTML=items.map(([k,l,ic])=>
    `<button data-nav="${k}" class="${view===k?'on':''}">${ic}<span>${l}</span></button>`).join('');
}

/* ---------- TODAY ---------- */
function viewToday(){
  const d=parseD(selDate), wd=d.toLocaleDateString('en-US',{weekday:'long'});
  const isToday=selDate===todayStr();
  const rel=selDate===todayStr()?'Today':selDate===addDays(todayStr(),1)?'Tomorrow':selDate===addDays(todayStr(),-1)?'Yesterday':wd;
  let h=`<div class="view-h">Today</div>
    <div class="view-sub">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})} — check your floors, plan ahead.</div>`;

  h+=`<div class="sec-label">Habits — today</div>`;
  if(!state.habits.length)h+=`<div class="empty">No habits yet. Add one below.</div>`;
  state.habits.forEach(hb=>h+=habitRow(hb));
  h+=`<div class="row-add"><button class="add-btn" data-addhabit>+ habit</button></div>`;

  // tasks for selected day
  h+=`<div class="sec-label">Tasks</div>
    <div class="daynav">
      <button class="nudge-btn" data-day="-1">‹</button>
      <span class="lbl">${rel}</span><span class="sm">${fmtD(selDate)}</span>
      <button class="nudge-btn" data-day="1">›</button>
      ${!isToday?`<button class="nudge-btn" data-day="today">Today</button>`:''}
    </div>`;
  const tasks=state.tasks.filter(t=>t.date===selDate);
  if(!tasks.length)h+=`<div class="empty">Nothing planned ${rel.toLowerCase()}. Add a task to plan it.</div>`;
  tasks.forEach(t=>{
    const g=t.goalId?state.goals.find(x=>x.id===t.goalId):null;
    h+=`<div class="task" data-task="${t.id}">
      <div class="cb ${t.done?'ck':''}" data-tasktoggle="${t.id}">${CHK}</div>
      <span class="task-t ${t.done?'done':''}">${esc(t.title)}</span>
      ${g?`<span class="tag">${esc(g.title)}</span>`:''}
      <button class="x" data-deltask="${t.id}">✕</button></div>`;
  });
  h+=`<div class="row-add">
      <input class="ghost-in" id="newtask" placeholder="Plan a task for ${rel.toLowerCase()}…">
      <select class="mini" id="newtaskgoal"><option value="">no goal</option>
        ${state.goals.map(g=>`<option value="${g.id}">${esc(g.title)}</option>`).join('')}</select>
    </div>`;
  return h;
}

function habitRow(hb){
  const today=todayStr();
  const done=hb.checkins.includes(today);
  const g=hb.goalId?state.goals.find(x=>x.id===hb.goalId):null;
  let stat='';
  if(hb.cadence==='weekly'){
    const wk=weekDates(today);
    const c=wk.filter(x=>hb.checkins.includes(x)).length;
    stat=`<span class="habit-stat">this week <b>${c}/${hb.weeklyTarget}</b></span>`;
  }else{
    stat=`<span class="habit-stat">streak <b>${streak(hb)}</b></span>`;
  }
  // nudge: daily only, yesterday & day-before both missed
  let nudge='';
  if(hb.cadence==='daily'){
    const y=addDays(today,-1),y2=addDays(today,-2);
    if(!hb.checkins.includes(y)&&!hb.checkins.includes(y2))
      nudge=`<div class="nudge">Two days missed — don't let it become three.</div>`;
  }
  return `<div class="habit">
    <div class="habit-top">
      <div class="cb ${done?'ck':''}" data-habittoggle="${hb.id}">${CHK}</div>
      <span class="habit-name">${esc(hb.title)}</span>
      ${g?`<span class="tag">${esc(g.title)}</span>`:''}
      ${stat}
      <button class="x" data-delhabit="${hb.id}">✕</button>
    </div>${nudge}${heatmap(hb)}</div>`;
}
function heatmap(hb){
  const WK=15, today=parseD(todayStr());
  // align grid so columns are weeks (Sun start), last column = current week
  const end=new Date(today); const dow=end.getDay();
  let cells='';
  for(let w=WK-1;w>=0;w--){
    cells+='<div class="heat-wk">';
    for(let d=0;d<7;d++){
      const off=-(w*7)+(d-dow);
      const date=new Date(today);date.setDate(today.getDate()+off);
      const s=`${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
      const fut=date>today;
      const hit=hb.checkins.includes(s);
      cells+=`<div class="heat-d ${hit?'h':''} ${fut?'fut':''}" title="${s}"></div>`;
    }
    cells+='</div>';
  }
  return `<div class="heat">${cells}</div>`;
}
function streak(hb){
  let n=0,d=todayStr();
  if(!hb.checkins.includes(d))d=addDays(d,-1);
  while(hb.checkins.includes(d)){n++;d=addDays(d,-1)}
  return n;
}
function weekDates(s){const out=[];const d=parseD(s);const dow=d.getDay();
  for(let i=0;i<7;i++){const x=new Date(d);x.setDate(d.getDate()-dow+i);out.push(`${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`)}return out}

/* ---------- GOALS ---------- */
function viewGoals(){
  let h=`<div class="view-h">Goals</div>
    <div class="view-sub">Each goal is a tree. Tick the leaves; the percentage rolls up on its own.</div>`;
  state.goals.forEach(g=>{
    const p=Math.round(goalPct(g));
    h+=`<div class="goal-card">
      <div class="goal-top">
        <span class="goal-title" data-rename-goal="${g.id}">${esc(g.title)}</span>
        <span class="goal-meta">${fmtD(g.start)} → ${fmtD(g.deadline)}</span>
        <button class="x" data-delgoal="${g.id}" style="margin-left:8px">✕</button>
      </div>
      <div class="goal-prog">
        <span class="goal-pct-big">${p}%</span>
        <div class="pbar"><i style="width:${p}%"></i></div>
      </div>
      <div class="tree">${renderTree(g.nodes,g.id,0)}</div>
      <div class="node-add" style="--ind:0">
        <input data-addroot="${g.id}" placeholder="+ add sub-goal…">
      </div>
    </div>`;
  });
  h+=`<div class="row-add" style="margin-top:22px"><button class="add-btn" data-addgoal>+ new goal</button></div>`;
  return h;
}
function renderTree(nodes,goalId,depth){
  if(!nodes)return'';
  return nodes.map(n=>{
    const ind=depth*22;
    const hasKids=n.children&&n.children.length;
    const open=expanded.has(n.id);
    let row;
    if(hasKids){
      const p=Math.round(nodePct(n));
      row=`<div class="node-row" style="--ind:${ind}px">
        <span class="twirl ${open?'open':''}" data-twirl="${n.id}">▶</span>
        <span class="node-title cont" data-rename="${n.id}">${esc(n.title)}</span>
        <span class="node-pct">${p}%</span>
        <button class="x" data-delnode="${n.id}">✕</button></div>`;
      if(open){
        row+=renderTree(n.children,goalId,depth+1);
        row+=`<div class="node-add" style="--ind:${ind+22}px"><input data-addchild="${n.id}" placeholder="+ add item…"></div>`;
      }
    }else{
      row=`<div class="node-row" style="--ind:${ind}px">
        <span class="twirl leaf">▶</span>
        <div class="cb ${n.done?'ck':''}" data-leaf="${n.id}">${CHK}</div>
        <span class="node-title ${n.done?'done':''}" data-rename="${n.id}">${esc(n.title)}</span>
        <button class="x add-btn" data-addchild="${n.id}" title="break into items" style="opacity:0;padding:1px 6px;font-size:.74rem;border:none">⊕</button>
        <button class="x" data-delnode="${n.id}">✕</button></div>`;
    }
    return `<div class="node" data-goal="${goalId}">${row}</div>`;
  }).join('');
}

/* ---------- TIMELINE (signature) ---------- */
function viewTimeline(){
  let h=`<div class="view-h">Timeline</div>
    <div class="view-sub">Your year as production phases. Bar length is the time span; the fill is progress. Click a bar to open its plan.</div>`;
  // header
  let months='';
  for(let m=0;m<12;m++)months+=`<div class="tl-mo" style="flex:${DAYS[m]} 0 0">${MO[m]}</div>`;
  let grid='';
  for(let m=0;m<12;m++)grid+=`<span style="flex:${DAYS[m]} 0 0"></span>`;
  const tf=yearFrac(todayStr())*100;

  let rows='';
  state.goals.forEach((g,i)=>{
    const sf=yearFrac(g.start)*100, ef=yearFrac(g.deadline)*100;
    const w=Math.max(ef-sf,2), p=Math.round(goalPct(g));
    rows+=`<div class="tl-row">
      <div class="tl-lane">
        <span class="tl-lane-rank">#${i+1}</span>
        <span class="tl-lane-name">${esc(g.title)}</span>
      </div>
      <div class="tl-plot">
        <div class="tl-grid">${grid}</div>
        <div class="tl-today" style="left:${tf}%"></div>
        <div class="tl-bar" data-openbar="${g.id}" style="left:${sf}%;width:${w}%">
          <i style="width:${p}%"></i><b>${p}%</b>
        </div>
        <div class="tl-flag" style="left:${ef}%"></div>
      </div></div>`;
  });

  h+=`<div class="tl">
    <div class="tl-head"><div class="tl-lane-lbl">Goal</div><div class="tl-months">${months}</div></div>
    ${rows}
  </div>
  <div class="tl-hint">The vertical line is today. Flags mark each deadline. Click any bar to check off its sub-goals — the fill updates live.</div>`;
  return h;
}

/* ---------- DRAWER ---------- */
function openDrawer(goalId){
  openGoal=goalId;
  const g=state.goals.find(x=>x.id===goalId);if(!g)return;
  const p=Math.round(goalPct(g));
  document.getElementById('drawerBody').innerHTML=`
    <div style="font-family:var(--disp);font-size:1.3rem;font-weight:600;letter-spacing:-.01em" data-rename-goal="${g.id}">${esc(g.title)}</div>
    <div style="font-size:.78rem;color:var(--muted);margin:4px 0 14px">${fmtD(g.start)} → ${fmtD(g.deadline)}</div>
    <div class="goal-prog"><span class="goal-pct-big">${p}%</span><div class="pbar"><i style="width:${p}%"></i></div></div>
    <div class="tree" style="margin-top:14px">${renderTree(g.nodes,g.id,0)}</div>
    <div class="node-add" style="--ind:0"><input data-addroot="${g.id}" placeholder="+ add sub-goal…"></div>`;
  document.getElementById('drawer').classList.add('on');
  document.getElementById('scrim').classList.add('on');
  wire();
}
function closeDrawer(){openGoal=null;document.getElementById('drawer').classList.remove('on');document.getElementById('scrim').classList.remove('on')}

/* =================== WIRE =================== */
function wire(){
  // nav
  document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{view=b.dataset.nav;render()});
  // leaf checkbox
  document.querySelectorAll('[data-leaf]').forEach(el=>el.onclick=()=>{
    const node=findInAll(el.dataset.leaf); if(node){node.done=!node.done;save();refresh()}});
  // twirl
  document.querySelectorAll('[data-twirl]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.twirl; expanded.has(id)?expanded.delete(id):expanded.add(id);refresh()});
  // add child / break leaf
  document.querySelectorAll('[data-addchild]').forEach(el=>{
    if(el.tagName==='INPUT'){el.onkeydown=e=>{if(e.key==='Enter'&&el.value.trim()){
      const n=findInAll(el.dataset.addchild);(n.children||(n.children=[])).push({id:uid(),title:el.value.trim()});
      delete n.done;expanded.add(n.id);save();refresh()}}}
    else{el.onclick=()=>{const n=findInAll(el.dataset.addchild);
      (n.children||(n.children=[])).push({id:uid(),title:'New item'});delete n.done;expanded.add(n.id);save();refresh()}}});
  // add root sub-goal
  document.querySelectorAll('[data-addroot]').forEach(el=>el.onkeydown=e=>{
    if(e.key==='Enter'&&el.value.trim()){const g=state.goals.find(x=>x.id===el.dataset.addroot);
      g.nodes.push({id:uid(),title:el.value.trim()});save();refresh()}});
  // delete node
  document.querySelectorAll('[data-delnode]').forEach(el=>el.onclick=()=>{
    state.goals.forEach(g=>removeNode(g.nodes,el.dataset.delnode));save();refresh()});
  // rename node / goal (dblclick)
  document.querySelectorAll('[data-rename]').forEach(el=>el.ondblclick=()=>{
    const n=findInAll(el.dataset.rename);const v=prompt('Rename:',n.title);if(v!==null&&v.trim()){n.title=v.trim();save();refresh()}});
  document.querySelectorAll('[data-rename-goal]').forEach(el=>el.ondblclick=()=>{
    const g=state.goals.find(x=>x.id===el.dataset.renameGoal);const v=prompt('Rename goal:',g.title);if(v!==null&&v.trim()){g.title=v.trim();save();refresh()}});
  // goals: add / delete
  document.querySelectorAll('[data-addgoal]').forEach(el=>el.onclick=()=>{
    const t=prompt('Goal name:');if(!t)return;
    const dl=prompt('Deadline (YYYY-MM-DD):',`${YEAR}-12-31`)||`${YEAR}-12-31`;
    state.goals.push({id:uid(),title:t.trim(),start:todayStr(),deadline:dl,nodes:[]});save();refresh()});
  document.querySelectorAll('[data-delgoal]').forEach(el=>el.onclick=()=>{
    if(confirm('Delete this goal?')){state.goals=state.goals.filter(g=>g.id!==el.dataset.delgoal);save();refresh()}});
  // timeline open
  document.querySelectorAll('[data-openbar]').forEach(el=>el.onclick=()=>openDrawer(el.dataset.openbar));
  // habits
  document.querySelectorAll('[data-habittoggle]').forEach(el=>el.onclick=()=>{
    const hb=state.habits.find(x=>x.id===el.dataset.habittoggle);const t=todayStr();
    const i=hb.checkins.indexOf(t);i>=0?hb.checkins.splice(i,1):hb.checkins.push(t);save();refresh()});
  document.querySelectorAll('[data-delhabit]').forEach(el=>el.onclick=()=>{
    state.habits=state.habits.filter(h=>h.id!==el.dataset.delhabit);save();refresh()});
  document.querySelectorAll('[data-addhabit]').forEach(el=>el.onclick=()=>{
    const t=prompt('Habit name:');if(!t)return;
    const wk=confirm('Weekly habit? (OK = X times/week, Cancel = daily)');
    let tgt=4;if(wk){tgt=parseInt(prompt('Times per week:','4'))||4}
    state.habits.push({id:uid(),title:t.trim(),cadence:wk?'weekly':'daily',weeklyTarget:tgt,goalId:null,checkins:[]});save();refresh()});
  // day nav
  document.querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>{
    const v=el.dataset.day;selDate=v==='today'?todayStr():addDays(selDate,parseInt(v));refresh()});
  // tasks
  document.querySelectorAll('[data-tasktoggle]').forEach(el=>el.onclick=()=>{
    const t=state.tasks.find(x=>x.id===el.dataset.tasktoggle);t.done=!t.done;save();refresh()});
  document.querySelectorAll('[data-deltask]').forEach(el=>el.onclick=()=>{
    state.tasks=state.tasks.filter(t=>t.id!==el.dataset.deltask);save();refresh()});
  const nt=document.getElementById('newtask');
  if(nt)nt.onkeydown=e=>{if(e.key==='Enter'&&nt.value.trim()){
    const gid=document.getElementById('newtaskgoal').value||null;
    state.tasks.push({id:uid(),title:nt.value.trim(),date:selDate,done:false,goalId:gid});save();refresh()}};
}
// re-render the active surface (view + drawer if open) without losing scroll wildly
function refresh(){render();if(openGoal)openDrawer(openGoal)}
// node lookup across all goals
function findInAll(id){for(const g of state.goals){const n=findNode(g.nodes,id);if(n)return n}return null}

function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---------- export / import ---------- */
function bindIO(){
  document.getElementById('exportBtn').onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`phase-goals-${todayStr()}.json`;a.click();toast('Backup exported')};
  document.getElementById('importBtn').onclick=()=>document.getElementById('fileIn').click();
  document.getElementById('fileIn').onchange=e=>{const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render();toast('Backup imported')}catch(err){toast('Could not read that file')}};r.readAsText(f)};
  document.getElementById('drawerClose').onclick=closeDrawer;
  document.getElementById('scrim').onclick=closeDrawer;
}
let toastT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),1900)}

/* =================== INIT =================== */
(function init(){
  state=load()||seed();
  // open all containers by default
  state.goals.forEach(g=>(function walk(ns){ns.forEach(n=>{if(n.children&&n.children.length){expanded.add(n.id);walk(n.children)}})})(g.nodes));
  bindIO();render();
})();
